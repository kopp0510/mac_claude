[pytest]
# pytest 配置

# 測試目錄
testpaths = tests

# Python 文件模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 輸出配置
addopts = -v --tb=short

# 忽略警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# 標記配置
markers =
    slow: 標記為慢速測試
    integration: 標記為整合測試
