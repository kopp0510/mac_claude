services:
  claude-bridge:
    build: .
    container_name: claude-bridge
    restart: unless-stopped

    # 環境變數
    env_file: .env

    volumes:
      # Claude Code 認證（Max/Pro OAuth 需要）
      - ~/.claude:/root/.claude

      # 日誌持久化
      - ~/.claude_bridge:/root/.claude_bridge

      # 專案目錄 — 在此掛載你的專案
      # 路徑必須與 sessions.yaml 中的 path 對齊
      # 範例：sessions.yaml 中 path: /workspace/rental-management
      #        對應此處 ./path/to/rental-management:/workspace/rental-management
      # - /Users/你的用戶名/project/rental-management:/workspace/rental-management

    # 無需暴露端口（Telegram Bot 使用 Long Polling）
